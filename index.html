<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <p>Cart Quantity</p>

  <button onclick="
    console.log(`Cart Quantity: ${cartQuantity}`)">Show Quantity
  </button>

  <button onclick="
     updateCartQuantity(1)
    ">Add to Cart
  </button>

  <button onclick="
    updateCartQuantity(2)
    ">+2
  </button>

  <button onclick="
     updateCartQuantity(3)
     ">+3
  </button>

  <button onclick="
    updateCartQuantity(4)
    ">+4
  </button>

  <button onclick="
    updateCartQuantity(5)
    ">+5
  </button>

  <button onclick="
    updateCartQuantity(-1) 
    ">Remove From Cart
  </button>

  <button onclick="
    updateCartQuantity(-2)
    ">-2
  </button>

  <button onclick="
    updateCartQuantity(-3)
    ">-3
  </button>

  <button onclick="
    cartQuantity = 0;
    console.log(`Cart Quantity: ${cartQuantity}`)">Reset
  </button>

  <script>
    let cartQuantity = 0;

    function updateCartQuantity(cartItem) {
      if (cartQuantity + cartItem > 10) {
      alert('cart is full')
      return
      }
      cartQuantity += cartItem
      console.log(`Cart Quantity: ${cartQuantity}`)
    }

  </script>
</body>
</html>
